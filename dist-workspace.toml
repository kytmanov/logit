[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# Allow checked-in CI workflow customizations
allow-dirty = ["ci"]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["homebrew", "powershell"]
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Homebrew tap to publish formulas to
tap = "kytmanov/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]
# Where to host releases
hosting = "github"
